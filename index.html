<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <link
      id="app-favicon"
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />

    <script>
      (() => {
        const match = window.location.pathname.match(
          /^\/gym\/([^/]+)\/?$/
        );

        const apiUrl = "%VITE_API_URL%".replace(/\/+$/, "");

        const manifest = document.createElement("link");

        manifest.id = "app-manifest";
        manifest.rel = "manifest";

        if (
          match &&
          apiUrl &&
          !apiUrl.includes("%VITE_API_URL%")
        ) {
          manifest.href =
            `${apiUrl}/public/gyms/${match[1]}` +
            "/manifest.webmanifest";

          manifest.crossOrigin = "anonymous";
        } else {
          manifest.href = "/manifest.webmanifest";
        }

        document.head.appendChild(manifest);
      })();
    </script>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <meta
      id="app-theme-color"
      name="theme-color"
      content="#111111"
    />

    <meta
      name="mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-title"
      content="GymStart"
    />

    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <link
      id="apple-touch-icon"
      rel="apple-touch-icon"
      href="/icon-192.png"
    />

    <title>GymStart</title>
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
